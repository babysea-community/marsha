          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref MarshaLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: web

  MarshaService:
    Type: AWS::ECS::Service
    DependsOn:
      - HttpListener
    Properties:
      ServiceName: !Sub '${ProjectName}-web'
      Cluster: !Ref MarshaCluster
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      EnableECSManagedTags: true
      PropagateTags: SERVICE
      HealthCheckGracePeriodSeconds: 120
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MaximumPercent: 200
        MinimumHealthyPercent: 0
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref AssignPublicIp
          SecurityGroups:
            - !Ref ServiceSecurityGroup
          Subnets: !Ref SubnetIds
      LoadBalancers:
        - ContainerName: marsha
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup
      TaskDefinition: !Ref MarshaTaskDefinition

  MarshaCronTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-cron'
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt MarshaExecutionRole.Arn
      TaskRoleArn: !GetAtt MarshaTaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: marsha-cron
          Image: public.ecr.aws/docker/library/node:24-alpine
          Essential: true
          Command:
            - node
            - -e
            - |
              const url = process.env.APP_CRON_URL;
              const secret = process.env.APP_CRON_SECRET;
              fetch(url, { headers: { authorization: 'Bearer ' + secret } })
                .then(async (response) => {
                  const body = await response.text();
                  console.log(body);
                  if (!response.ok) process.exit(1);
                })
                .catch((error) => {
                  console.error(error);
                  process.exit(1);
                });
          Environment:
            - Name: APP_CRON_URL
              Value: !Sub
                - '${BaseUrl}/api/cron/process-runs?limit=${CronBatchLimit}'
                - BaseUrl: !If
                    - HasSiteUrl
                    - !Ref SiteUrl
                    - !Sub 'http://${LoadBalancer.DNSName}'
          Secrets:
            - Name: APP_CRON_SECRET
              ValueFrom: !Ref MarshaCronSecretSecret
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref MarshaLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: cron

  MarshaCronInvokeRole:
    Type: AWS::IAM::Role
    Condition: CronEnabled
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunMarshaCronTask
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RunTask
                Resource: !Ref MarshaCronTaskDefinition
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !GetAtt MarshaExecutionRole.Arn
                  - !GetAtt MarshaTaskRole.Arn

  MarshaCronRule:
    Type: AWS::Events::Rule
    Condition: CronEnabled
    Properties:
      Description: Scheduled Marsha queued-run recovery.
      ScheduleExpression: !Ref CronScheduleExpression
      State: ENABLED
      Targets:
        - Arn: !GetAtt MarshaCluster.Arn
          Id: MarshaCronTask
          RoleArn: !GetAtt MarshaCronInvokeRole.Arn
          EcsParameters:
            LaunchType: FARGATE
            TaskDefinitionArn: !Ref MarshaCronTaskDefinition
            NetworkConfiguration:
              AwsVpcConfiguration:
                AssignPublicIp: !Ref AssignPublicIp
                SecurityGroups:
                  - !Ref ServiceSecurityGroup
                Subnets: !Ref SubnetIds

Outputs:
  SiteUrl:
    Description: Runtime URL used by Marsha.
    Value: !If
      - HasSiteUrl
      - !Ref SiteUrl
      - !Sub 'http://${LoadBalancer.DNSName}'

  LoadBalancerDnsName:
    Description: Application Load Balancer DNS name.
    Value: !GetAtt LoadBalancer.DNSName

  EcrRepositoryUri:
    Description: Push Marsha images to this ECR repository and update ImageUri.
    Value: !GetAtt MarshaRepository.RepositoryUri

  ClusterName:
    Value: !Ref MarshaCluster

  ServiceName:
    Value: !GetAtt MarshaService.Name

  LogGroupName:
    Value: !Ref MarshaLogGroup

  SecretPrefix:
    Description: Populate retained Secrets Manager values under this prefix before raising DesiredCount.
    Value: !Sub '/${ProjectName}/${AWS::StackName}/'

  CronRuleName:
    Condition: CronEnabled
    Value: !Ref MarshaCronRule
