AWSTemplateFormatVersion: '2010-09-09'
Description: Marsha on ECS Fargate behind an Application Load Balancer with optional scheduled run recovery.

Parameters:
  ProjectName:
    Type: String
    Default: marsha
    AllowedPattern: '^[a-z][a-z0-9-]{1,24}$'
    Description: Lowercase name prefix for AWS resources created by this stack.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the load balancer and ECS tasks. Tasks need outbound access to Aurora/PostgreSQL, BabySea, and inference providers.

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Two or more subnet IDs. Use public subnets with AssignPublicIp=ENABLED for first deploys, or private subnets with NAT.

  AssignPublicIp:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Set DISABLED when ECS tasks run in private subnets with NAT access.

  LoadBalancerScheme:
    Type: String
    Default: internet-facing
    AllowedValues:
      - internet-facing
      - internal

  AllowedHttpCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to reach the Application Load Balancer on HTTP.

  ImageUri:
    Type: String
    Default: public.ecr.aws/docker/library/node:24-alpine
    Description: Marsha container image URI. Keep the placeholder while DesiredCount is 0, then update after pushing your image.

  DesiredCount:
    Type: Number
    Default: 0
    MinValue: 0
    MaxValue: 10
    Description: Start at 0 until the image is pushed and Secrets Manager values are populated; then update to 1 or more.

  TaskCpu:
    Type: String
    Default: '1024'
    AllowedValues:
      - '512'
      - '1024'
      - '2048'

  TaskMemory:
    Type: String
    Default: '2048'
    AllowedValues:
      - '1024'
      - '2048'
      - '3072'
      - '4096'

  ContainerPort:
    Type: Number
    Default: 3000
    MinValue: 1
    MaxValue: 65535

  HealthCheckPath:
    Type: String
    Default: /api/health

  SiteUrl:
    Type: String
    Default: ''
    Description: Optional public URL or custom domain. When blank, the stack uses the ALB HTTP URL for NEXT_PUBLIC_SITE_URL.

  ProviderMode:
    Type: String
    Default: byok
    AllowedValues:
      - byok
      - babysea

  BflRegion:
    Type: String
    Default: global
    AllowedValues:
      - global
      - eu
      - us

  BflApiBaseUrl:
    Type: String
    Default: https://api.bfl.ai/v1

  BabySeaRegion:
    Type: String
    Default: us

  BabySeaApiBaseUrl:
    Type: String
    Default: https://api.us.babysea.ai

  StorageProvider:
    Type: String
    Default: none
    AllowedValues:
      - none
      - alibaba-cloud-oss
      - aws-s3
      - backblaze-b2
      - cloudflare-r2
      - huggingface-storage-buckets
      - minio
      - scaleway-object-storage
      - spaces-object-storage
      - vercel-blob
    Description: Optional media storage backend for completed step outputs.

  AlibabaCloudOssRegion:
    Type: String
    Default: ''
    Description: Optional Alibaba Cloud OSS bucket region (only when StorageProvider=alibaba-cloud-oss).

  AlibabaCloudOssBucketName:
    Type: String
    Default: ''
    Description: Optional Alibaba Cloud OSS bucket name (only when StorageProvider=alibaba-cloud-oss).

  AlibabaCloudOssEndpoint:
    Type: String
    Default: ''
    Description: Optional Alibaba Cloud OSS endpoint host override.

  AlibabaCloudOssPublicBaseUrl:
    Type: String
    Default: ''
    Description: Optional browser-readable media base URL, e.g. a CDN domain.

  AwsS3Region:
    Type: String
    Default: ''
    Description: Optional AWS S3 region (only when StorageProvider=aws-s3).

  AwsS3BucketName:
    Type: String
    Default: ''
    Description: Optional AWS S3 bucket name (only when StorageProvider=aws-s3).

  AwsS3EndpointUrl:
    Type: String
    Default: ''
    Description: Optional browser-readable media base URL, e.g. a CloudFront domain.

  BackblazeB2BucketName:
    Type: String
    Default: ''
    Description: Optional Backblaze B2 bucket name (only when StorageProvider=backblaze-b2).

  BackblazeB2BucketId:
    Type: String
    Default: ''
    Description: Optional Backblaze B2 bucket id.

  BackblazeB2PublicBaseUrl:
    Type: String
    Default: ''
    Description: Optional public/custom media base URL for Backblaze B2.

  CloudflareR2AccountId:
    Type: String
    Default: ''
    Description: Optional Cloudflare account id (only when StorageProvider=cloudflare-r2).

  CloudflareR2BucketName:
    Type: String
    Default: ''
    Description: Optional Cloudflare R2 bucket name.

  CloudflareR2EndpointUrl:
    Type: String
    Default: ''
    Description: Optional Cloudflare R2 S3 API endpoint URL.

  CloudflareR2CustomDomainUrl:
    Type: String
    Default: ''
    Description: Optional public R2.dev/custom domain base URL.

  HuggingFaceStorageNamespace:
    Type: String
    Default: ''
    Description: Optional Hugging Face namespace (only when StorageProvider=huggingface-storage-buckets).

  HuggingFaceStorageBucketName:
    Type: String
    Default: ''
    Description: Optional Hugging Face Storage Bucket name.

  HuggingFaceStoragePublicBaseUrl:
    Type: String
    Default: ''
    Description: Optional public/custom media base URL for Hugging Face Storage Buckets.

  MinioEndpointUrl:
    Type: String
    Default: ''
    Description: Optional MinIO S3 API endpoint URL (only when StorageProvider=minio).

  MinioBucketName:
    Type: String
    Default: ''
    Description: Optional MinIO bucket name.

  MinioRegion:
    Type: String
    Default: us-east-1
    Description: Optional MinIO S3 region.

  MinioPublicBaseUrl:
    Type: String
    Default: ''
    Description: Optional public/custom media base URL for MinIO.

  ScalewayObjectStorageRegion:
    Type: String
    Default: ''
    Description: Optional Scaleway region, e.g. fr-par (only when StorageProvider=scaleway-object-storage).

  ScalewayObjectStorageBucketName:
    Type: String
    Default: ''
    Description: Optional Scaleway Object Storage bucket name.

  ScalewayObjectStorageEndpointUrl:
    Type: String
    Default: ''
    Description: Optional Scaleway S3 API endpoint URL.

  ScalewayObjectStoragePublicBaseUrl:
    Type: String
    Default: ''
    Description: Optional public/custom media base URL for Scaleway Object Storage.

  SpacesRegion:
    Type: String
    Default: ''
    Description: Optional DigitalOcean Spaces region, e.g. nyc3 (only when StorageProvider=spaces-object-storage).

  SpacesBucketName:
    Type: String
    Default: ''
    Description: Optional DigitalOcean Spaces bucket name.

  SpacesEndpointUrl:
    Type: String
    Default: ''
    Description: Optional DigitalOcean Spaces S3 API endpoint URL.

  SpacesPublicBaseUrl:
    Type: String
    Default: ''
    Description: Optional public/custom media base URL for DigitalOcean Spaces.

  BedrockRegion:
    Type: String
    Default: us-east-1
    Description: Optional Amazon Bedrock region for the Agentic Workflow planner.

  BedrockNovaAgentModel:
    Type: String
    Default: us.amazon.nova-2-lite-v1:0
    Description: Optional Amazon Nova model id for the Agentic Workflow planner.

  NextPublicSentryDsn:
    Type: String
    Default: ''
    Description: Optional public Sentry DSN.

  NextPublicSentryEnvironment:
    Type: String
    Default: production

  EnableCron:
    Type: String
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED
    Description: Enable after DesiredCount is above 0 and APP_CRON_SECRET is populated.

  CronScheduleExpression:
    Type: String
    Default: rate(5 minutes)
    Description: EventBridge schedule expression for queued-run recovery.

  CronBatchLimit:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 50

  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues:
      - 7
      - 14
      - 30
      - 60
      - 90
      - 180
      - 365

Conditions:
  HasSiteUrl: !Not [!Equals [!Ref SiteUrl, '']]
  CronEnabled: !Equals [!Ref EnableCron, ENABLED]

Resources:
  MarshaRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: !Sub '${ProjectName}'
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep the last 20 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 20
                },
                "action": { "type": "expire" }
              }
            ]
          }

  MarshaCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${ProjectName}'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  MarshaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/ecs/${ProjectName}'
      RetentionInDays: !Ref LogRetentionDays

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Marsha load balancer ingress.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedHttpCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Marsha ECS task traffic from the load balancer and outbound provider access.
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: !Ref LoadBalancerScheme
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup
      Subnets: !Ref SubnetIds
      Type: application
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: 'false'
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckEnabled: true
      HealthCheckIntervalSeconds: 30
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      Matcher:
        HttpCode: 200-399
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      UnhealthyThresholdCount: 5
      VpcId: !Ref VpcId
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP

  OwnerEmailSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/OWNER_EMAIL'
      Description: Dashboard owner email allowed to sign in.

  OwnerPasswordSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/OWNER_PASSWORD'
      Description: Dashboard owner password.

  OwnerSessionSecretSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/OWNER_SESSION_SECRET'
      Description: Secret used to sign owner dashboard sessions.

  DatabaseUrlSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/DATABASE_URL'
      Description: PostgreSQL/Aurora connection string for Marsha durable state.

  MarshaApiKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/APP_API_KEY'
      Description: Caller API keys for Marsha.

  MarshaCronSecretSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/APP_CRON_SECRET'
      Description: Shared secret used by the scheduled cron recovery task.

  MarshaCallbackSecretSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/APP_CALLBACK_SECRET'
      Description: Secret used to sign outbound terminal run callbacks.

  DashscopeApiKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/DASHSCOPE_API_KEY'
      Description: Alibaba Cloud DashScope API key for BYOK mode.

  BflApiKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/BFL_API_KEY'
      Description: Black Forest Labs API key for BYOK mode.

  ArkApiKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/ARK_API_KEY'
      Description: BytePlus Ark API key for BYOK mode.

  GeminiApiKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/GEMINI_API_KEY'
      Description: Google Gemini API key for BYOK mode.

  OpenAiApiKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/OPENAI_API_KEY'
      Description: OpenAI API key for BYOK mode.

  RunwayApiSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/RUNWAYML_API_SECRET'
      Description: Runway API key for BYOK mode.

  BabySeaApiKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/BABYSEA_API_KEY'
      Description: BabySea API key for BabySea provider mode.

  BabySeaWebhookSecretSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/BABYSEA_WEBHOOK_SECRET'
      Description: Optional BabySea webhook signature secret.

  BedrockBearerTokenSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/AGENT_CHAIN_AWS_BEDROCK_TOKEN'
      Description: Optional Amazon Bedrock bearer token for the Agentic Workflow planner.

  AlibabaCloudOssAccessKeyIdSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/ALIBABA_CLOUD_OSS_ACCESS_KEY_ID'
      Description: Optional Alibaba Cloud OSS access key id for media storage.

  AlibabaCloudOssAccessKeySecretSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/ALIBABA_CLOUD_OSS_ACCESS_KEY_SECRET'
      Description: Optional Alibaba Cloud OSS access key secret for media storage.

  AwsS3AccessKeyIdSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/AWS_S3_ACCESS_KEY_ID'
      Description: Optional AWS S3 access key id for media storage.

  AwsS3SecretAccessKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/AWS_S3_SECRET_ACCESS_KEY'
      Description: Optional AWS S3 secret access key for media storage.

  BackblazeB2KeyIdSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/BACKBLAZE_B2_KEY_ID'
      Description: Optional Backblaze B2 key id for media storage.

  BackblazeB2ApplicationKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/BACKBLAZE_B2_APPLICATION_KEY'
      Description: Optional Backblaze B2 application key for media storage.

  CloudflareR2AccessKeyIdSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/CLOUDFLARE_R2_ACCESS_KEY_ID'
      Description: Optional Cloudflare R2 access key id for media storage.

  CloudflareR2SecretAccessKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/CLOUDFLARE_R2_SECRET_ACCESS_KEY'
      Description: Optional Cloudflare R2 secret access key for media storage.

  HuggingFaceStorageAccessKeyIdSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/HUGGINGFACE_STORAGE_ACCESS_KEY_ID'
      Description: Optional Hugging Face generated S3 access key id for media storage.

  HuggingFaceStorageSecretAccessKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/HUGGINGFACE_STORAGE_SECRET_ACCESS_KEY'
      Description: Optional Hugging Face generated S3 secret access key for media storage.

  MinioAccessKeyIdSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/MINIO_ACCESS_KEY_ID'
      Description: Optional MinIO access key id for media storage.

  MinioSecretAccessKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/MINIO_SECRET_ACCESS_KEY'
      Description: Optional MinIO secret access key for media storage.

  ScalewayObjectStorageAccessKeyIdSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/SCALEWAY_OBJECT_STORAGE_ACCESS_KEY_ID'
      Description: Optional Scaleway Object Storage access key id for media storage.

  ScalewayObjectStorageSecretAccessKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/SCALEWAY_OBJECT_STORAGE_SECRET_ACCESS_KEY'
      Description: Optional Scaleway Object Storage secret access key for media storage.

  SpacesAccessKeyIdSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/SPACES_ACCESS_KEY_ID'
      Description: Optional DigitalOcean Spaces access key id for media storage.

  SpacesSecretAccessKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/SPACES_SECRET_ACCESS_KEY'
      Description: Optional DigitalOcean Spaces secret access key for media storage.

  BlobReadWriteTokenSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/BLOB_READ_WRITE_TOKEN'
      Description: Optional Vercel Blob read-write token for media storage.

  SentryOrgSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/SENTRY_ORG'
      Description: Optional Sentry organization slug for source map uploads.

  SentryProjectSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub '/${ProjectName}/${AWS::StackName}/SENTRY_PROJECT'
      Description: Optional Sentry project slug for source map uploads.

  MarshaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadMarshaSecrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref OwnerEmailSecret
                  - !Ref OwnerPasswordSecret
                  - !Ref OwnerSessionSecretSecret
                  - !Ref DatabaseUrlSecret
                  - !Ref MarshaApiKeySecret
                  - !Ref MarshaCronSecretSecret
                  - !Ref MarshaCallbackSecretSecret
                  - !Ref DashscopeApiKeySecret
                  - !Ref BflApiKeySecret
                  - !Ref ArkApiKeySecret
                  - !Ref GeminiApiKeySecret
                  - !Ref OpenAiApiKeySecret
                  - !Ref RunwayApiSecret
                  - !Ref BabySeaApiKeySecret
                  - !Ref BabySeaWebhookSecretSecret
                  - !Ref BedrockBearerTokenSecret
                  - !Ref AlibabaCloudOssAccessKeyIdSecret
                  - !Ref AlibabaCloudOssAccessKeySecretSecret
                  - !Ref AwsS3AccessKeyIdSecret
                  - !Ref AwsS3SecretAccessKeySecret
                  - !Ref BlobReadWriteTokenSecret
                  - !Ref SentryOrgSecret
                  - !Ref SentryProjectSecret

  MarshaTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  MarshaTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${ProjectName}-web'
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt MarshaExecutionRole.Arn
      TaskRoleArn: !GetAtt MarshaTaskRole.Arn
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ContainerDefinitions:
        - Name: marsha
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: HOSTNAME
              Value: 0.0.0.0
            - Name: PORT
              Value: !Sub '${ContainerPort}'
            - Name: NEXT_PUBLIC_SITE_URL
              Value: !If
                - HasSiteUrl
                - !Ref SiteUrl
                - !Sub 'http://${LoadBalancer.DNSName}'
            - Name: APP_DATABASE
              Value: aurora
            - Name: APP_PROVIDER_MODE
              Value: !Ref ProviderMode
            - Name: BFL_REGION
              Value: !Ref BflRegion
            - Name: BFL_API_BASE_URL
              Value: !Ref BflApiBaseUrl
            - Name: BABYSEA_REGION
              Value: !Ref BabySeaRegion
            - Name: BABYSEA_API_BASE_URL
              Value: !Ref BabySeaApiBaseUrl
            - Name: AGENT_CHAIN_AWS_BEDROCK_REGION
              Value: !Ref BedrockRegion
            - Name: AGENT_CHAIN_AWS_BEDROCK_AGENT
              Value: !Ref BedrockNovaAgentModel
            - Name: APP_STORAGE_PROVIDER
              Value: !Ref StorageProvider
            - Name: ALIBABA_CLOUD_OSS_REGION
              Value: !Ref AlibabaCloudOssRegion
            - Name: ALIBABA_CLOUD_OSS_BUCKET_NAME
              Value: !Ref AlibabaCloudOssBucketName
            - Name: ALIBABA_CLOUD_OSS_ENDPOINT
              Value: !Ref AlibabaCloudOssEndpoint
            - Name: ALIBABA_CLOUD_OSS_PUBLIC_BASE_URL
              Value: !Ref AlibabaCloudOssPublicBaseUrl
            - Name: AWS_S3_REGION
              Value: !Ref AwsS3Region
            - Name: AWS_S3_BUCKET_NAME
              Value: !Ref AwsS3BucketName
            - Name: AWS_S3_ENDPOINT_URL
              Value: !Ref AwsS3EndpointUrl
            - Name: BACKBLAZE_B2_BUCKET_NAME
              Value: !Ref BackblazeB2BucketName
            - Name: BACKBLAZE_B2_BUCKET_ID
              Value: !Ref BackblazeB2BucketId
