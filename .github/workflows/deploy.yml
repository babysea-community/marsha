name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - preview
          - production

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  deploy-vercel:
    name: Vercel (${{ github.event.inputs.environment || 'production' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::VERCEL_TOKEN/VERCEL_ORG_ID/VERCEL_PROJECT_ID not configured for this environment; skipping deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "deploy=true" >> "$GITHUB_OUTPUT"
        id: check
      - uses: actions/checkout@v7
        if: steps.check.outputs.deploy == 'true'
      - uses: pnpm/action-setup@v6
        if: steps.check.outputs.deploy == 'true'
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        if: steps.check.outputs.deploy == 'true'
        with:
          node-version: 24
          cache: pnpm
      - name: Install Vercel CLI
        if: steps.check.outputs.deploy == 'true'
        run: pnpm add -g vercel@latest
      - name: Pull Vercel environment
        if: steps.check.outputs.deploy == 'true'
        env:
          VERCEL_ENVIRONMENT: ${{ github.event.inputs.environment == 'preview' && 'preview' || 'production' }}
        run: |
          vercel pull --yes \
            --environment="$VERCEL_ENVIRONMENT" \
            --token "$VERCEL_TOKEN"
      - name: Check Marsha runtime environment
        if: steps.check.outputs.deploy == 'true'
        env:
          VERCEL_ENVIRONMENT: ${{ github.event.inputs.environment == 'preview' && 'preview' || 'production' }}
        run: |
          node <<'NODE'
          const { existsSync, readFileSync } = require('node:fs');

          const required = [
            'NEXT_PUBLIC_SITE_URL',
            'OWNER_EMAIL',
            'OWNER_PASSWORD',
            'OWNER_SESSION_SECRET',
            'DATABASE_URL',
            'APP_API_KEY',
            'APP_CRON_SECRET',
            'APP_CALLBACK_SECRET',
          ];
          const envName = process.env.VERCEL_ENVIRONMENT || 'production';
          const file = `.vercel/.env.${envName}.local`;

          if (!existsSync(file)) {
            console.error(`::error::Vercel environment file was not pulled: ${file}`);
            process.exit(1);
          }

          const env = Object.create(null);

          for (const line of readFileSync(file, 'utf8').split(/\r?\n/)) {
            const trimmed = line.trim();

            if (!trimmed || trimmed.startsWith('#')) {
              continue;
            }

            const separator = trimmed.indexOf('=');

            if (separator === -1) {
              continue;
            }

            const name = trimmed.slice(0, separator).trim();
            let value = trimmed.slice(separator + 1).trim();

            if (
              (value.startsWith('"') && value.endsWith('"')) ||
              (value.startsWith("'") && value.endsWith("'"))
            ) {
              value = value.slice(1, -1);
            }

            env[name] = value;
          }

          const missing = required.filter((name) => !env[name]?.trim());

          if (missing.length > 0) {
            console.error(
              `::error::Missing required Marsha Vercel ${envName} env vars: ${missing.join(', ')}`,
            );
            process.exit(1);
          }

          const providerMode = env.APP_PROVIDER_MODE?.trim() || 'byok';

          if (!['byok', 'babysea'].includes(providerMode)) {
            console.error('::error::APP_PROVIDER_MODE must be byok or babysea.');
            process.exit(1);
          }

          if (
            providerMode === 'byok' &&
            !env.DASHSCOPE_API_KEY?.trim() &&
            !env.BFL_API_KEY?.trim() &&
            !env.ARK_API_KEY?.trim() &&
            !env.GEMINI_API_KEY?.trim() &&
            !env.GOOGLE_API_KEY?.trim() &&
            !env.OPENAI_API_KEY?.trim() &&
            !env.RUNWAYML_API_SECRET?.trim()
          ) {
            console.error('::error::APP_PROVIDER_MODE=byok requires DASHSCOPE_API_KEY, BFL_API_KEY, ARK_API_KEY, GEMINI_API_KEY or GOOGLE_API_KEY, OPENAI_API_KEY, or RUNWAYML_API_SECRET.');
            process.exit(1);
          }

          if (env.BFL_REGION?.trim() && !['global', 'eu', 'us'].includes(env.BFL_REGION.trim())) {
            console.error('::error::BFL_REGION must be one of: global, eu, us.');
            process.exit(1);
          }

          if (env.BFL_API_BASE_URL?.trim()) {
            let bflUrl;

            try {
              bflUrl = new URL(env.BFL_API_BASE_URL);
            } catch {
              console.error('::error::BFL_API_BASE_URL must be a valid URL.');
              process.exit(1);
            }

            if (bflUrl.protocol !== 'https:' || !bflUrl.hostname.toLowerCase().endsWith('.bfl.ai')) {
              console.error('::error::BFL_API_BASE_URL must use HTTPS and end with .bfl.ai.');
              process.exit(1);
            }
          }

          if (providerMode === 'babysea') {
            const babyseaRequired = [
              'BABYSEA_API_KEY',
              'BABYSEA_API_BASE_URL',
            ];
            const babyseaMissing = babyseaRequired.filter((name) => !env[name]?.trim());

            if (babyseaMissing.length > 0) {
              console.error(
                `::error::Missing required BabySea-mode Vercel ${envName} env vars: ${babyseaMissing.join(', ')}`,
              );
              process.exit(1);
            }

            if (env.BABYSEA_REGION?.trim() && !['us', 'eu', 'jp'].includes(env.BABYSEA_REGION.trim())) {
              console.error('::error::BABYSEA_REGION must be one of: us, eu, jp.');
              process.exit(1);
            }

            let babyseaUrl;

            try {
              babyseaUrl = new URL(env.BABYSEA_API_BASE_URL);
            } catch {
              console.error('::error::BABYSEA_API_BASE_URL must be a valid URL.');
              process.exit(1);
            }

            if (babyseaUrl.protocol !== 'https:') {
              console.error('::error::BABYSEA_API_BASE_URL must use HTTPS.');
              process.exit(1);
            }

            const babyseaHost = babyseaUrl.hostname.toLowerCase();

            if (!['api.us.babysea.ai', 'api.eu.babysea.ai', 'api.jp.babysea.ai'].includes(babyseaHost)) {
              console.error('::error::BABYSEA_API_BASE_URL must be a BabySea API host.');
              process.exit(1);
            }
          }

          console.log(`Marsha Vercel ${envName} environment has required runtime variables.`);
          NODE
      - name: Build
        if: steps.check.outputs.deploy == 'true'
        run: |
          vercel build ${{ (github.event_name == 'push' || github.event.inputs.environment == 'production') && '--prod' || '' }} \
            --token "$VERCEL_TOKEN"
      - name: Deploy
        if: steps.check.outputs.deploy == 'true'
        run: |
          vercel deploy --prebuilt ${{ (github.event_name == 'push' || github.event.inputs.environment == 'production') && '--prod' || '' }} \
            --token "$VERCEL_TOKEN"
