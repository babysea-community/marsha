  RUNWAYML_API_SECRET: ci_runway_api_secret
  BABYSEA_API_KEY: ci_babysea_api_key
  BABYSEA_REGION: us
  BABYSEA_API_BASE_URL: https://api.us.babysea.ai
  BABYSEA_WEBHOOK_SECRET: ci_babysea_webhook_secret
