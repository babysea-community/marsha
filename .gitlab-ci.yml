include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/SAST-IaC.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Code-Quality.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml
  - template: DAST.gitlab-ci.yml

stages:
  - verify
  - test
  - build
  - security
  - dast

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "external_pull_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

variables:
  GIT_DEPTH: '0'
  AST_ENABLE_MR_PIPELINES: 'true'
  GITLAB_ADVANCED_SAST_ENABLED: 'true'
  SECURE_LOG_LEVEL: warn
  SAST_EXCLUDED_PATHS: '.next,.pnpm-store,dist,build,node_modules,public'
  DS_EXCLUDED_PATHS: '.next,.pnpm-store,dist,build,node_modules,public'
  SECRET_DETECTION_EXCLUDED_PATHS: '.next,.pnpm-store,dist,build,node_modules,public'
  SECRET_DETECTION_HISTORIC_SCAN: 'true'
  CONTAINER_SCANNING_DISABLED: 'false'
  CS_DISABLE_DEPENDENCY_LIST: 'false'
  DAST_BROWSER_SCAN: 'true'
  APP_DOCTOR_SKIP_DB_REACHABILITY: '1'
  PNPM_VERSION: '11.7.0'
  PNPM_INSTALL_FLAGS: --frozen-lockfile --ignore-scripts
  PNPM_CONFIG_MINIMUM_RELEASE_AGE: '0'
  DAST_WEBSITE: https://marsha.babysea.live
  NEXT_PUBLIC_SITE_URL: https://your-domain.example.com
  OWNER_EMAIL: ci_owner_email
  OWNER_PASSWORD: ci_owner_password
  OWNER_SESSION_SECRET: ci_owner_session_secret
  APP_DATABASE: aurora
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
  APP_API_KEY: ci_APP_API_KEY
  APP_CRON_SECRET: ci_APP_CRON_SECRET
