default:
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

container_scanning:
  stage: security
  allow_failure: true
  rules:
    - if: '$CONTAINER_SCANNING_DISABLED == "true" || $CONTAINER_SCANNING_DISABLED == "1"'
      when: never
    - if: '$CS_IMAGE'
    - when: never

code_quality:
  allow_failure: true

gemnasium-dependency_scanning:
  allow_failure: true

gitlab-advanced-sast:
  allow_failure: true

kics-iac-sast:
  allow_failure: true

secret_detection:
  allow_failure: true

.pnpm-job:
  image: node:24-bookworm
  cache:
    key:
      files:
        - pnpm-lock.yaml
      prefix: pnpm-${CI_COMMIT_REF_SLUG}
    paths:
      - .pnpm-store/
  before_script:
    - corepack enable
    - corepack prepare pnpm@$PNPM_VERSION --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install $PNPM_INSTALL_FLAGS

verify:doctor:
  stage: verify
  extends: .pnpm-job
  timeout: 10m
  script:
    - |
      if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.doctor ? 0 : 1)"; then
        pnpm doctor
      else
        echo 'No doctor script; skipping.'
      fi

verify:format:
  stage: verify
  extends: .pnpm-job
  timeout: 10m
  script:
    - |
      if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.format ? 0 : 1)"; then
        pnpm format
      else
        echo 'No format script; skipping.'
      fi

verify:lint:
  stage: verify
  extends: .pnpm-job
  timeout: 10m
  script:
    - |
      if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.lint ? 0 : 1)"; then
        pnpm lint
      else
        echo 'No lint script; skipping.'
      fi

verify:typecheck:
  stage: verify
  extends: .pnpm-job
  timeout: 10m
  script:
    - |
      if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.typecheck ? 0 : 1)"; then
        pnpm typecheck
      else
        echo 'No typecheck script; skipping.'
      fi

build:app:
  stage: build
  extends: .pnpm-job
  timeout: 15m
  script:
    - |
      if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.build ? 0 : 1)"; then
        pnpm build
      else
        echo 'No build script; skipping.'
      fi

dependency:audit:
  stage: security
  extends: .pnpm-job
  allow_failure: true
  timeout: 10m
  needs: []
  script:
    - pnpm audit --prod --audit-level=high

secret:scan:
  stage: security
  image:
    name: zricethezav/gitleaks:v8.28.0
    entrypoint: ['']
  allow_failure: true
  timeout: 5m
  needs: []
  script:
    - gitleaks detect --source . --no-banner --redact

dast:
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
    - when: never
