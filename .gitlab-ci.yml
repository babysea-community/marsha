  ALIBABA_CLOUD_OSS_REGION: ci_alibaba_cloud_oss_region
  ALIBABA_CLOUD_OSS_ACCESS_KEY_ID: ci_alibaba_cloud_oss_access_key_id
  ALIBABA_CLOUD_OSS_ACCESS_KEY_SECRET: ci_alibaba_cloud_oss_access_key_secret
  ALIBABA_CLOUD_OSS_BUCKET_NAME: ci_alibaba_cloud_oss_bucket_name
  ALIBABA_CLOUD_OSS_ENDPOINT: ci_alibaba_cloud_oss_endpoint
