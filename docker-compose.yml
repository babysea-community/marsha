services:
  marsha:
    image: ${APP_IMAGE:-babyseaoss/marsha:latest}
    pull_policy: missing
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-production}
    restart: unless-stopped
    ports:
      - '${APP_HOST_PORT:-3000}:3000'
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      OWNER_EMAIL: ${OWNER_EMAIL}
      OWNER_PASSWORD: ${OWNER_PASSWORD}
      OWNER_SESSION_SECRET: ${OWNER_SESSION_SECRET}
      APP_DATABASE: ${APP_DATABASE:-aurora}
      DATABASE_URL: ${DATABASE_URL}
      APP_API_KEY: ${APP_API_KEY}
      APP_CRON_SECRET: ${APP_CRON_SECRET}
      APP_CALLBACK_SECRET: ${APP_CALLBACK_SECRET}
      APP_PROVIDER_MODE: ${APP_PROVIDER_MODE:-byok}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      BFL_API_KEY: ${BFL_API_KEY:-}
      BFL_REGION: ${BFL_REGION:-global}
      BFL_API_BASE_URL: ${BFL_API_BASE_URL:-https://api.bfl.ai/v1}
      ARK_API_KEY: ${ARK_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUNWAYML_API_SECRET: ${RUNWAYML_API_SECRET:-}
      BABYSEA_API_KEY: ${BABYSEA_API_KEY:-}
      BABYSEA_REGION: ${BABYSEA_REGION:-us}
      BABYSEA_API_BASE_URL: ${BABYSEA_API_BASE_URL:-https://api.us.babysea.ai}
      BABYSEA_WEBHOOK_SECRET: ${BABYSEA_WEBHOOK_SECRET:-}
      AGENT_CHAIN_AWS_BEDROCK_TOKEN: ${AGENT_CHAIN_AWS_BEDROCK_TOKEN:-}
      AGENT_CHAIN_AWS_BEDROCK_REGION: ${AGENT_CHAIN_AWS_BEDROCK_REGION:-us-east-1}
      AGENT_CHAIN_AWS_BEDROCK_AGENT: ${AGENT_CHAIN_AWS_BEDROCK_AGENT:-us.amazon.nova-2-lite-v1:0}
      APP_STORAGE_PROVIDER: ${APP_STORAGE_PROVIDER:-none}
      ALIBABA_CLOUD_OSS_REGION: ${ALIBABA_CLOUD_OSS_REGION:-}
      ALIBABA_CLOUD_OSS_ACCESS_KEY_ID: ${ALIBABA_CLOUD_OSS_ACCESS_KEY_ID:-}
      ALIBABA_CLOUD_OSS_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_OSS_ACCESS_KEY_SECRET:-}
      ALIBABA_CLOUD_OSS_BUCKET_NAME: ${ALIBABA_CLOUD_OSS_BUCKET_NAME:-}
      ALIBABA_CLOUD_OSS_ENDPOINT: ${ALIBABA_CLOUD_OSS_ENDPOINT:-}
      ALIBABA_CLOUD_OSS_PUBLIC_BASE_URL: ${ALIBABA_CLOUD_OSS_PUBLIC_BASE_URL:-}
      AWS_S3_REGION: ${AWS_S3_REGION:-}
      AWS_S3_ACCESS_KEY_ID: ${AWS_S3_ACCESS_KEY_ID:-}
      AWS_S3_SECRET_ACCESS_KEY: ${AWS_S3_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-}
      BACKBLAZE_B2_KEY_ID: ${BACKBLAZE_B2_KEY_ID:-}
      BACKBLAZE_B2_APPLICATION_KEY: ${BACKBLAZE_B2_APPLICATION_KEY:-}
      BACKBLAZE_B2_BUCKET_NAME: ${BACKBLAZE_B2_BUCKET_NAME:-}
      BACKBLAZE_B2_BUCKET_ID: ${BACKBLAZE_B2_BUCKET_ID:-}
      BACKBLAZE_B2_PUBLIC_BASE_URL: ${BACKBLAZE_B2_PUBLIC_BASE_URL:-}
      CLOUDFLARE_R2_ACCOUNT_ID: ${CLOUDFLARE_R2_ACCOUNT_ID:-}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${CLOUDFLARE_R2_ACCESS_KEY_ID:-}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY:-}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME:-}
      CLOUDFLARE_R2_ENDPOINT_URL: ${CLOUDFLARE_R2_ENDPOINT_URL:-}
      CLOUDFLARE_R2_CUSTOM_DOMAIN_URL: ${CLOUDFLARE_R2_CUSTOM_DOMAIN_URL:-}
      HUGGINGFACE_STORAGE_NAMESPACE: ${HUGGINGFACE_STORAGE_NAMESPACE:-}
      HUGGINGFACE_STORAGE_ACCESS_KEY_ID: ${HUGGINGFACE_STORAGE_ACCESS_KEY_ID:-}
      HUGGINGFACE_STORAGE_SECRET_ACCESS_KEY: ${HUGGINGFACE_STORAGE_SECRET_ACCESS_KEY:-}
      HUGGINGFACE_STORAGE_BUCKET_NAME: ${HUGGINGFACE_STORAGE_BUCKET_NAME:-}
      HUGGINGFACE_STORAGE_PUBLIC_BASE_URL: ${HUGGINGFACE_STORAGE_PUBLIC_BASE_URL:-}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL:-}
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY_ID:-}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_ACCESS_KEY:-}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-}
      SCALEWAY_OBJECT_STORAGE_REGION: ${SCALEWAY_OBJECT_STORAGE_REGION:-}
      SCALEWAY_OBJECT_STORAGE_ACCESS_KEY_ID: ${SCALEWAY_OBJECT_STORAGE_ACCESS_KEY_ID:-}
      SCALEWAY_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${SCALEWAY_OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
      SCALEWAY_OBJECT_STORAGE_BUCKET_NAME: ${SCALEWAY_OBJECT_STORAGE_BUCKET_NAME:-}
      SCALEWAY_OBJECT_STORAGE_ENDPOINT_URL: ${SCALEWAY_OBJECT_STORAGE_ENDPOINT_URL:-}
      SCALEWAY_OBJECT_STORAGE_PUBLIC_BASE_URL: ${SCALEWAY_OBJECT_STORAGE_PUBLIC_BASE_URL:-}
      SPACES_REGION: ${SPACES_REGION:-}
      SPACES_ACCESS_KEY_ID: ${SPACES_ACCESS_KEY_ID:-}
      SPACES_SECRET_ACCESS_KEY: ${SPACES_SECRET_ACCESS_KEY:-}
      SPACES_BUCKET_NAME: ${SPACES_BUCKET_NAME:-}
      SPACES_ENDPOINT_URL: ${SPACES_ENDPOINT_URL:-}
      SPACES_PUBLIC_BASE_URL: ${SPACES_PUBLIC_BASE_URL:-}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-production}
      SENTRY_ORG: ${SENTRY_ORG:-}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:''+(process.env.PORT||3000)+''/api/health'').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
