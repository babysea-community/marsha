[build]
  command = "pnpm run build"
  publish = ".next"

[template.environment]
  NEXT_PUBLIC_SITE_URL = "Required. The exact URL where Marsha runs, for example https://<your_domain>."
  OWNER_EMAIL = "Required. Owner email allowed to access the dashboard."
  OWNER_PASSWORD = "Required. Owner password. Keep it server-only."
  OWNER_SESSION_SECRET = "Required. Hex secret used to sign owner sessions."
  APP_DATABASE = "Optional. aurora (default) or polardb. Both are PostgreSQL."
  DATABASE_URL = "Required. PostgreSQL connection string. Keep ?sslmode=require in production."
  APP_API_KEY = "Required. API key used by caller apps."
  APP_CRON_SECRET = "Required. Bearer secret for queued-run recovery calls."
  APP_CALLBACK_SECRET = "Required. HMAC secret for terminal callbacks."
  APP_PROVIDER_MODE = "Optional. byok (default) or babysea."
  DASHSCOPE_API_KEY = "Optional (byok). Alibaba Cloud Model Studio API key."
  BFL_API_KEY = "Optional (byok). Black Forest Labs API key."
  BFL_REGION = "Optional (byok). global (default), eu, or us."
  BFL_API_BASE_URL = "Optional (byok). BFL API base URL."
  ARK_API_KEY = "Optional (byok). BytePlus ModelArk API key."
  GEMINI_API_KEY = "Optional (byok). Google Gemini API key."
  OPENAI_API_KEY = "Optional (byok). OpenAI API key."
  RUNWAYML_API_SECRET = "Optional (byok). Runway API secret."
  BABYSEA_API_KEY = "Optional (babysea mode). BabySea API key."
  BABYSEA_REGION = "Optional (babysea mode). us (default), eu, or jp."
  BABYSEA_API_BASE_URL = "Optional (babysea mode). BabySea API base URL."
  BABYSEA_WEBHOOK_SECRET = "Optional (babysea mode). BabySea inbound webhook secret."
  AGENT_CHAIN_AWS_BEDROCK_TOKEN = "Optional. AWS Bedrock token for the Agentic Workflow planner."
  AGENT_CHAIN_AWS_BEDROCK_REGION = "Optional. Bedrock region. Default us-east-1."
  AGENT_CHAIN_AWS_BEDROCK_AGENT = "Optional. Bedrock model id. Default us.amazon.nova-2-lite-v1:0."
  APP_STORAGE_PROVIDER = "Optional. none (default), alibaba-cloud-oss, aws-s3, backblaze-b2, cloudflare-r2, huggingface-storage-buckets, minio, scaleway-object-storage, spaces-object-storage, or vercel-blob."
  ALIBABA_CLOUD_OSS_REGION = "Optional (alibaba-cloud-oss). OSS bucket region, e.g. oss-us-east-1."
  ALIBABA_CLOUD_OSS_ACCESS_KEY_ID = "Optional (alibaba-cloud-oss). OSS access key id."
  ALIBABA_CLOUD_OSS_ACCESS_KEY_SECRET = "Optional (alibaba-cloud-oss). OSS access key secret."
  ALIBABA_CLOUD_OSS_BUCKET_NAME = "Optional (alibaba-cloud-oss). OSS bucket name."
  ALIBABA_CLOUD_OSS_ENDPOINT = "Optional (alibaba-cloud-oss). OSS endpoint host override."
  ALIBABA_CLOUD_OSS_PUBLIC_BASE_URL = "Optional (alibaba-cloud-oss). Public CDN/base URL for stored media."
  AWS_S3_REGION = "Optional (aws-s3). S3 region."
  AWS_S3_ACCESS_KEY_ID = "Optional (aws-s3). S3 access key id."
  AWS_S3_SECRET_ACCESS_KEY = "Optional (aws-s3). S3 secret access key."
  AWS_S3_BUCKET_NAME = "Optional (aws-s3). S3 bucket name."
  AWS_S3_ENDPOINT_URL = "Optional (aws-s3). Public CloudFront/base URL for stored media."
  BACKBLAZE_B2_KEY_ID = "Optional (backblaze-b2). Backblaze B2 key id."
  BACKBLAZE_B2_APPLICATION_KEY = "Optional (backblaze-b2). Backblaze B2 application key."
  BACKBLAZE_B2_BUCKET_NAME = "Optional (backblaze-b2). Backblaze B2 bucket name."
  BACKBLAZE_B2_BUCKET_ID = "Optional (backblaze-b2). Backblaze B2 bucket id."
  BACKBLAZE_B2_PUBLIC_BASE_URL = "Optional (backblaze-b2). Public/custom base URL for stored media."
  CLOUDFLARE_R2_ACCOUNT_ID = "Optional (cloudflare-r2). Cloudflare account id."
  CLOUDFLARE_R2_ACCESS_KEY_ID = "Optional (cloudflare-r2). R2 access key id."
  CLOUDFLARE_R2_SECRET_ACCESS_KEY = "Optional (cloudflare-r2). R2 secret access key."
  CLOUDFLARE_R2_BUCKET_NAME = "Optional (cloudflare-r2). R2 bucket name."
  CLOUDFLARE_R2_ENDPOINT_URL = "Optional (cloudflare-r2). R2 S3 API endpoint URL."
  CLOUDFLARE_R2_CUSTOM_DOMAIN_URL = "Optional (cloudflare-r2). Public R2.dev/custom domain base URL."
  HUGGINGFACE_STORAGE_NAMESPACE = "Optional (huggingface-storage-buckets). Hugging Face namespace."
  HUGGINGFACE_STORAGE_ACCESS_KEY_ID = "Optional (huggingface-storage-buckets). Hugging Face generated S3 access key id."
  HUGGINGFACE_STORAGE_SECRET_ACCESS_KEY = "Optional (huggingface-storage-buckets). Hugging Face generated S3 secret access key."
  HUGGINGFACE_STORAGE_BUCKET_NAME = "Optional (huggingface-storage-buckets). Storage Bucket name within the namespace."
  HUGGINGFACE_STORAGE_PUBLIC_BASE_URL = "Optional (huggingface-storage-buckets). Public/custom base URL for stored media."
  MINIO_ENDPOINT_URL = "Optional (minio). MinIO S3 API endpoint URL."
  MINIO_ACCESS_KEY_ID = "Optional (minio). MinIO access key id."
  MINIO_SECRET_ACCESS_KEY = "Optional (minio). MinIO secret access key."
  MINIO_BUCKET_NAME = "Optional (minio). MinIO bucket name."
  MINIO_REGION = "Optional (minio). S3 region. Default us-east-1."
  MINIO_PUBLIC_BASE_URL = "Optional (minio). Public/custom base URL for stored media."
  SCALEWAY_OBJECT_STORAGE_REGION = "Optional (scaleway-object-storage). Scaleway region, e.g. fr-par."
  SCALEWAY_OBJECT_STORAGE_ACCESS_KEY_ID = "Optional (scaleway-object-storage). Scaleway access key id."
  SCALEWAY_OBJECT_STORAGE_SECRET_ACCESS_KEY = "Optional (scaleway-object-storage). Scaleway secret access key."
  SCALEWAY_OBJECT_STORAGE_BUCKET_NAME = "Optional (scaleway-object-storage). Scaleway Object Storage bucket name."
  SCALEWAY_OBJECT_STORAGE_ENDPOINT_URL = "Optional (scaleway-object-storage). S3 endpoint URL."
  SCALEWAY_OBJECT_STORAGE_PUBLIC_BASE_URL = "Optional (scaleway-object-storage). Public/custom base URL for stored media."
  SPACES_REGION = "Optional (spaces-object-storage). DigitalOcean Spaces region, e.g. nyc3."
  SPACES_ACCESS_KEY_ID = "Optional (spaces-object-storage). Spaces access key id."
  SPACES_SECRET_ACCESS_KEY = "Optional (spaces-object-storage). Spaces secret access key."
  SPACES_BUCKET_NAME = "Optional (spaces-object-storage). Spaces bucket name."
  SPACES_ENDPOINT_URL = "Optional (spaces-object-storage). Spaces S3 API endpoint URL."
  SPACES_PUBLIC_BASE_URL = "Optional (spaces-object-storage). Public/custom base URL for stored media."
  BLOB_READ_WRITE_TOKEN = "Optional (vercel-blob). Vercel Blob read/write token."
  NEXT_PUBLIC_SENTRY_DSN = "Optional. Sentry DSN for error tracking."
  NEXT_PUBLIC_SENTRY_ENVIRONMENT = "Optional. Sentry environment. Default production."
  SENTRY_ORG = "Optional. Sentry org slug for build-time source map upload."
  SENTRY_PROJECT = "Optional. Sentry project slug for build-time source map upload."
  SENTRY_AUTH_TOKEN = "Optional. Sentry auth token for build-time source map upload."

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Scheduled Function: recover the run queue every 5 minutes so queued or
# running chains advance even when no owner browser is open. Runs on the
# Netlify free plan. Requires APP_CRON_SECRET in the Netlify site environment
# (Functions scope).
[functions."process-runs"]
  schedule = "*/5 * * * *"
