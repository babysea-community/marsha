services:
  - type: web
    name: marsha
    runtime: node
    autoDeploy: false
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start -- -p $PORT
    envVars:
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_PASSWORD
        sync: false
      - key: OWNER_SESSION_SECRET
        sync: false
      - key: APP_DATABASE
        value: aurora
      - key: DATABASE_URL
        sync: false
      - key: APP_API_KEY
        sync: false
      - key: APP_CRON_SECRET
        sync: false
      - key: APP_CALLBACK_SECRET
        sync: false
      - key: APP_PROVIDER_MODE
        value: byok
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: BFL_API_KEY
        sync: false
      - key: BFL_REGION
        value: global
      - key: BFL_API_BASE_URL
        value: https://api.bfl.ai/v1
      - key: ARK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RUNWAYML_API_SECRET
        sync: false
      - key: BABYSEA_API_KEY
        sync: false
      - key: BABYSEA_REGION
        value: us
      - key: BABYSEA_API_BASE_URL
        value: https://api.us.babysea.ai
      - key: BABYSEA_WEBHOOK_SECRET
